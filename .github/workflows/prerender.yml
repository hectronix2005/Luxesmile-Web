name: Build (imágenes WebP + pre-render SEO)

# Cuando el admin publica (cambia content.json con imágenes base64), este flujo:
#   1. Extrae las imágenes base64 a archivos .webp y reescribe content.json a rutas.
#   2. Regenera el contenido SEO estático de index.html.
# Luego commitea los cambios. El commit lo hace GITHUB_TOKEN, que por diseño NO
# vuelve a disparar el workflow (evita bucles).
on:
  push:
    branches: [main]
    paths:
      - 'assets/data/content.json'
      - 'scripts/extract-images.mjs'
      - 'scripts/prerender.mjs'
      - 'package.json'
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: build-content
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar dependencias
        run: npm ci

      - name: Extraer imágenes base64 → WebP
        run: node scripts/extract-images.mjs

      - name: Regenerar HTML pre-renderizado
        run: node scripts/prerender.mjs

      - name: Compilar Tailwind CSS
        run: npm run build:css

      - name: Commit si hubo cambios
        run: |
          git add assets/data/content.json assets/img/content index.html assets/css/tailwind.css
          if git diff --cached --quiet; then
            echo "Sin cambios; nada que commitear."
          else
            git config user.name "luxe-build[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git commit -m "chore(build): extraer imágenes a WebP y regenerar SEO estático"
            git push
          fi
